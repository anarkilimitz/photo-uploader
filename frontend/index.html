<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload</title>
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <div class="upload-container">
        <h1>Программа для загрузки фото (только формат jpg и png)<br> в Yandex Object Storage</h1>
        <div class="custom-file-upload">
            <label for="fileInput" class="file-label">Выбрать фото</label>
            <input type="file" id="fileInput" accept="image/*" class="file-input">
            <span class="file-name">Файл не выбран</span>
            <button class="upload-btn">Загрузить</button>
        </div>

    </div>

    <div class="modal-container">
        <div class="modal" id="modal">
            <h2 class="modal-title">Фото отправлено</h2>
            <button class="upload-btn close-button">Закрыть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
